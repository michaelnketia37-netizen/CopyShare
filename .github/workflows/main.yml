name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project files
        run: |
          if [ ! -f "CopyShare_Phase5_Integrated.zip" ]; then
            echo "ERROR: CopyShare_Phase5_Integrated.zip not found"
            exit 1
          fi
          unzip -q CopyShare_Phase5_Integrated.zip -d extracted/
          echo "Extraction completed. Directory contents:"
          ls -la extracted/
          # Verify gradlew exists
          if [ ! -f "extracted/gradlew" ]; then
            echo "ERROR: gradlew not found in extracted directory"
            echo "Searching for gradlew:"
            find extracted -name "gradlew" -o -name "*.gradle*" | head -20
            exit 1
          fi
          echo "gradlew found successfully"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Make gradlew executable
        run: chmod +x extracted/gradlew

      - name: Build APK
        run: |
          cd extracted/
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: extracted/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: List build outputs
        run: |
          echo "Build completed. Output files:"
          find extracted/app/build/outputs -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20
